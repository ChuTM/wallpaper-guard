<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpaper Guard | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body class="bg-slate-900 text-slate-100 font-sans">
    <div class="max-w-5xl mx-auto py-10 px-6">
        <header class="flex justify-between items-center mb-4 border-b border-slate-800 pb-2">
            <div>
                <h1 class="text-3xl font-bold tracking-tight text-white">Wallpaper Guard</h1>
                <p class="text-slate-400">Network Device Monitoring</p>
            </div>
            <div id="connection-status"
                class="px-4 py-1 rounded-full text-xs font-mono bg-green-500/10 text-green-400 border border-green-500/20">
                SERVER LIVE
            </div>
        </header>

        <div class="mb-8">
            <label for="config_mode">Config Mode</label>
            <input type="checkbox" name="config_mode" id="config_mode">
        </div>
        <main>
            <div class="bg-slate-800 rounded-xl shadow-2xl overflow-hidden border border-slate-700">
                <table class="w-full text-left">
                    <thead class="bg-slate-700/50 text-slate-300 uppercase text-xs font-semibold">
                        <tr>
                            <th class="px-6 py-4">Device Name</th>
                            <th class="px-6 py-4">Status</th>
                            <th class="px-6 py-4">Last Activity</th>
                        </tr>
                    </thead>
                    <tbody id="device-table" class="divide-y divide-slate-700">
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script>
        const socket = io();

        async function fetchStatus() {
            const response = await fetch('/api/status');
            const data = await response.json();
            const table = document.getElementById('device-table');

            table.innerHTML = data.map(device => `
                <tr class="hover:bg-slate-700/30 transition-colors">
                    <td class="px-6 py-4 font-medium">${device.name}</td>
                    <td class="px-6 py-4">
                        <span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium ${device.status === 'Online'
                    ? 'bg-emerald-500/10 text-emerald-400'
                    : 'bg-rose-500/10 text-rose-400'
                }">
                            <span class="w-2 h-2 mr-1.5 rounded-full ${device.status === 'Online' ? 'bg-emerald-500 animate-pulse' : 'bg-rose-500'}"></span>
                            ${device.status}
                        </span>
                    </td>
                    <td class="px-6 py-4 text-slate-400 text-sm italic">
                        ${device.lastSeen || device.firstSeen}
                    </td>
                </tr>
            `).join('');
        }

        // Initial load
        fetchStatus();

        // Listen for live updates from server
        socket.on('refresh-ui', fetchStatus);

        document.getElementById("config_mode").addEventListener("input", () => {
            const c = document.getElementById("config_mode").checked;
            fetch("http://localhost:7100/api/control-access", {
                method: "POST", headers: {
                    "Content-Type": "application/json" // Tell the server this is JSON
                },
                body: JSON.stringify({
                    allow_config: c
                })
            });
        });
    </script>
</body>

</html>
