<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wallpaper Guard | Admin</title>
    <!-- Font Awesome for the Header Section Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="/socket.io/socket.io.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>

<body>
    <div class="wrapper">
        <header>
            <div>
                <h1>Wallpaper Guard</h1>
                <div class="tagline">Network Device Monitoring</div>
            </div>
            <div id="connection-status">
                ● Server Live
            </div>
        </header>

        <!-- Functional Admin Form Panel Control Interface block -->
        <div class="block-container">
            <div class="config-mode-wrapper">
                <input type="checkbox" name="config_mode" id="config_mode">
                <label for="config_mode">Enable Configuration Mode</label>
            </div>
            <div class="command-wrapper">
                <input type="text" name="exec_command" id="exec_command" class="url-input"
                    placeholder="Enter command to execute on clients...">
                <button type="button" onclick="executeCommand()" class="copy-trigger-btn">
                    Execute
                </button>
            </div>
        </div>

        <main id="content">
            <h2>Monitored Clients</h2>

            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Device Name</th>
                            <th>Status</th>
                            <th>Last Activity</th>
                        </tr>
                    </thead>
                    <tbody id="device-table">
                        <!-- Content injection point via JavaScript -->
                    </tbody>
                </table>
            </div>
        </main>
    </div>

    <script src="/admin.script.js"></script>
</body>

</html>
